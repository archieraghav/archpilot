version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: archpilot_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: archpilot
      POSTGRES_PASSWORD: archpilot
      POSTGRES_DB: archpilot
    ports:
      - "5432:5432"
    volumes:
      - archpilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archpilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: archpilot_backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: archpilot_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  archpilot_pg_data: